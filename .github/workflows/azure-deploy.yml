name: Deploy to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # steps가 build-and-deploy와 같은 라인에 있으면 안 되고, 한 단계 안으로 들여써야 합니다.
    steps:  
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3  # 스크린샷 버전에 맞춰 v3로 변경 권장
        with:
          app-name: 'dedicatusmyawssomeapp'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .